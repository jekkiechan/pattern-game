<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEYBATTLE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Orbitron', monospace;
    user-select: none;
    cursor: default;
  }

  @media (max-width: 600px) {
    body { overflow-y: auto; }
  }

  canvas { display: block; cursor: crosshair; }

  /* ── HUD ── */
  #hud {
    position: fixed;
    top: 18px;
    left: 0; right: 0;
    display: none;
    justify-content: center;
    gap: 16px;
    pointer-events: none;
    z-index: 5;
    flex-wrap: wrap;
    padding: 0 12px;
  }

  .stamina-bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .stamina-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    opacity: 0.9;
  }

  .stamina-track {
    width: 84px;
    height: 5px;
    background: #0a0a0a;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid #1a1a1a;
  }

  .stamina-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.08s linear;
  }

  /* ── OVERLAY ── */
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 20;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  @media (max-width: 600px) {
    #overlay {
      align-items: flex-start;
      padding: 16px 0;
    }
  }

  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    pointer-events: all;
    text-align: center;
    padding: 20px;
  }

  .screen.active { display: flex; }

  h1 {
    font-size: clamp(32px, 9vw, 110px);
    font-weight: 900;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 10px;
    line-height: 1;
    text-shadow:
      0 0 30px #00d4ff,
      0 0 70px #00d4ff55,
      0 0 140px #00d4ff22;
    animation: titlePulse 2.4s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 30px #00d4ff, 0 0 70px #00d4ff55; }
    50%       { text-shadow: 0 0 50px #00d4ff, 0 0 100px #00d4ff77, 0 0 200px #00d4ff22; }
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    color: #556;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .btn {
    padding: 15px 52px;
    background: transparent;
    border: 2px solid #00d4ff;
    color: #00d4ff;
    font-family: 'Orbitron', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 5px;
    cursor: pointer;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    transition: color 0.2s;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: #00d4ff;
    transform: translateX(-101%);
    transition: transform 0.22s ease;
    z-index: -1;
  }

  .btn:hover::before { transform: translateX(0); }
  .btn:hover { color: #000; }

  .result-title {
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    line-height: 1;
  }

  .win  { color: #00ff88; text-shadow: 0 0 40px #00ff88, 0 0 80px #00ff8833; }
  .lose { color: #ff3030; text-shadow: 0 0 40px #ff3030, 0 0 80px #ff303033; }
  .draw { color: #ffcc00; text-shadow: 0 0 40px #ffcc00, 0 0 80px #ffcc0033; }

  /* ── LAUNCH HINT ── */
  #launch-hint {
    position: fixed;
    bottom: 52px;
    left: 50%; transform: translateX(-50%);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: #334;
    pointer-events: none;
    z-index: 5;
    white-space: nowrap;
    animation: hint 1.8s ease-in-out infinite;
  }

  @keyframes hint {
    0%, 100% { opacity: 0.4; }
    50%       { opacity: 0.85; }
  }

  /* ── CHARACTER SELECT ── */
  #screen-select {
    width: 100%;
    max-width: 980px;
    padding: 12px 16px 20px;
  }

  #screen-select h2 {
    font-size: clamp(16px, 3vw, 28px);
    font-weight: 900;
    letter-spacing: 6px;
    color: #fff;
    text-shadow: 0 0 20px #00d4ff;
    margin-bottom: 14px;
  }

  #char-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    width: 100%;
    margin-bottom: 14px;
  }

  @media (max-width: 600px) {
    #char-grid { grid-template-columns: repeat(3, 1fr); }
  }

  /* ── OPPONENT SELECT ── */
  #screen-opponents {
    width: 100%;
    max-width: 980px;
    padding: 12px 16px 20px;
  }
  #screen-opponents h2 {
    font-size: clamp(16px, 3vw, 28px);
    font-weight: 900;
    letter-spacing: 6px;
    color: #fff;
    text-shadow: 0 0 20px #ff4422;
    margin-bottom: 6px;
  }
  #opp-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    width: 100%;
    margin-bottom: 14px;
  }
  @media (max-width: 600px) {
    #opp-grid { grid-template-columns: repeat(3, 1fr); }
  }
  .opp-card.selected-opp {
    transform: translateY(-3px);
  }
  .opp-card.disabled-opp {
    opacity: 0.3;
    pointer-events: none;
  }

  /* ── ARENA SELECT ── */
  #screen-arena {
    width: 100%;
    max-width: 820px;
    padding: 12px 16px 20px;
  }
  #screen-arena h2 {
    font-size: clamp(16px, 3vw, 26px);
    font-weight: 900;
    letter-spacing: 6px;
    color: #fff;
    text-shadow: 0 0 20px #00d4ff;
    margin-bottom: 14px;
  }
  #arena-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    width: 100%;
    margin-bottom: 14px;
  }

  @media (max-width: 600px) {
    #arena-grid { grid-template-columns: repeat(3, 1fr); }
  }
  .arena-card {
    background: #05080f;
    border: 1.5px solid #1a1f2e;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .arena-card:hover { transform: translateY(-2px); }
  .arena-card.selected { transform: translateY(-3px); }
  .arena-card canvas { display: block; width: 100%; height: 80px; }
  .arena-card-body { padding: 7px 8px 9px; }
  .arena-card-name {
    font-size: 8px; font-weight: 700;
    letter-spacing: 1px; color: #fff;
    margin-bottom: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .arena-card-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 7px; letter-spacing: 1px; color: #445;
    margin-bottom: 6px;
  }
  .arena-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 7px; letter-spacing: 2px;
    padding: 1px 5px; border-radius: 2px; display: inline-block;
  }
  #arena-detail {
    background: #05080f; border: 1px solid #1a1f2e;
    border-radius: 6px; padding: 12px 18px;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 16px; min-height: 54px;
  }
  #arena-detail-name {
    font-size: clamp(12px, 2vw, 18px); font-weight: 900;
    letter-spacing: 3px; color: #fff;
  }
  #arena-detail-desc {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; color: #445; margin-top: 4px; letter-spacing: 1px;
  }

  .char-card {
    background: #05080f;
    border: 1.5px solid #1a1f2e;
    border-radius: 6px;
    padding: 10px 8px 9px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.12s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
    text-align: center;
  }

  .char-card:hover {
    transform: translateY(-2px);
    border-color: #334;
  }

  .char-card.selected {
    transform: translateY(-3px);
  }

  .char-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--c);
    box-shadow: 0 0 10px var(--c);
  }

  .char-card-name {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
    margin: 6px 0 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .char-type-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 7px;
    letter-spacing: 2px;
    padding: 1px 5px;
    border-radius: 2px;
    margin-bottom: 7px;
    display: inline-block;
  }

  .char-tier-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 7px;
    letter-spacing: 2px;
    padding: 1px 5px;
    border-radius: 2px;
    display: inline-block;
  }

  @keyframes mythicalShimmer {
    0%   { color: #ff88ff; text-shadow: 0 0 8px #ff88ff88; }
    20%  { color: #ff4488; text-shadow: 0 0 8px #ff448888; }
    40%  { color: #ffcc00; text-shadow: 0 0 8px #ffcc0088; }
    60%  { color: #44ffcc; text-shadow: 0 0 8px #44ffcc88; }
    80%  { color: #8844ff; text-shadow: 0 0 8px #8844ff88; }
    100% { color: #ff88ff; text-shadow: 0 0 8px #ff88ff88; }
  }

  .tier-mythical {
    animation: mythicalShimmer 2.4s linear infinite;
  }

  .stat-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 3px;
  }

  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 7px;
    color: #556;
    width: 24px;
    text-align: right;
    flex-shrink: 0;
  }

  .stat-track {
    flex: 1;
    height: 4px;
    background: #0d1018;
    border-radius: 2px;
    overflow: hidden;
  }

  .stat-fill {
    height: 100%;
    border-radius: 2px;
  }

  /* ── DETAIL PANEL ── */
  #char-detail {
    background: #05080f;
    border: 1px solid #1a1f2e;
    border-radius: 6px;
    padding: 12px 18px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 20px;
    min-height: 64px;
  }

  #detail-name {
    font-size: clamp(12px, 2vw, 20px);
    font-weight: 900;
    letter-spacing: 3px;
    color: #fff;
  }

  #detail-type {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    margin-top: 2px;
  }

  #detail-desc {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: #445;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  #detail-stats {
    display: flex;
    gap: 12px;
    margin-left: auto;
  }

  .big-stat {
    text-align: center;
  }

  .big-stat-val {
    font-size: 20px;
    font-weight: 900;
    line-height: 1;
  }

  .big-stat-lbl {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    color: #445;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .nav-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-back {
    padding: 10px 24px;
    background: transparent;
    border: 1px solid #334;
    color: #445;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-back:hover { border-color: #556; color: #778; }

  .btn-secondary {
    padding: 12px 32px;
    background: transparent;
    border: 2px solid #334;
    color: #556;
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn-secondary:hover { border-color: #00d4ff; color: #00d4ff; }

  .affinity-row {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    margin-top: 6px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .affinity-pos { color: #00ff88; }
  .affinity-neg { color: #ff4422; }

  .card-affinity {
    position: absolute;
    top: 5px; right: 5px;
    width: 7px; height: 7px;
    border-radius: 50%;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="hud"></div>
<div id="launch-hint" style="display:none">CLICK YOUR BLADE · DRAG BACK · RELEASE TO LAUNCH</div>

<div id="overlay">
  <div class="screen active" id="screen-start">
    <h1>BeyBattle</h1>
    <div class="subtitle">Spinning Top Arena Combat</div>
    <button class="btn" id="btn-start">SELECT BLADE</button>
    <div class="subtitle" style="font-size:10px;color:#333;margin-top:-8px">
      10 characters · 3 enemies · last blade standing wins
    </div>
  </div>

  <div class="screen" id="screen-select">
    <h2>SELECT YOUR BLADE</h2>
    <div id="char-grid"></div>
    <div id="char-detail">
      <div>
        <div id="detail-name"></div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:2px">
          <div id="detail-type"></div>
          <div id="detail-tier" style="font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px"></div>
        </div>
        <div id="detail-desc"></div>
      </div>
      <div id="detail-stats"></div>
    </div>
    <button class="btn" id="btn-fight">CHOOSE ARENA →</button>
  </div>

  <div class="screen" id="screen-opponents">
    <h2>PICK YOUR OPPONENTS</h2>
    <div class="subtitle" id="opp-count-label">SELECT 3 OPPONENTS</div>
    <div id="opp-grid"></div>
    <div class="nav-row">
      <button class="btn-back" id="btn-opp-back">← BACK</button>
      <button class="btn-secondary" id="btn-randomize">RANDOMIZE</button>
      <button class="btn" id="btn-opponents">LET IT RIP →</button>
    </div>
  </div>

  <div class="screen" id="screen-arena">
    <h2>CHOOSE YOUR ARENA</h2>
    <div id="arena-grid"></div>
    <div id="arena-detail">
      <div>
        <div id="arena-detail-name"></div>
        <div id="arena-detail-desc"></div>
        <div id="arena-affinity-row" class="affinity-row"></div>
      </div>
    </div>
    <div class="nav-row">
      <button class="btn-back" id="btn-arena-back">← BACK</button>
      <button class="btn" id="btn-arena-next">PICK OPPONENTS →</button>
    </div>
  </div>

  <div class="screen" id="screen-end">
    <div class="result-title" id="result-title"></div>
    <div class="subtitle" id="result-sub" style="color:#445"></div>
    <button class="btn" id="btn-restart">BATTLE AGAIN</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════════
let _audioCtx = null;
function audio() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}

function makeDistCurve(amount) {
  const n = 256, curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = (Math.PI + amount) * x / (Math.PI + amount * Math.abs(x));
  }
  return curve;
}

function playHit(intensity = 0.5) {
  const ac = audio(), now = ac.currentTime;
  const osc  = ac.createOscillator();
  const osc2 = ac.createOscillator();
  const dist = ac.createWaveShaper();
  const gain = ac.createGain();

  dist.curve = makeDistCurve(150);
  osc.connect(dist); osc2.connect(dist);
  dist.connect(gain); gain.connect(ac.destination);

  const f = 280 + intensity * 550;
  osc.type  = 'sawtooth';
  osc2.type = 'square';
  osc.frequency.setValueAtTime(f, now);
  osc.frequency.exponentialRampToValueAtTime(70, now + 0.13);
  osc2.frequency.setValueAtTime(f * 1.6, now);
  osc2.frequency.exponentialRampToValueAtTime(55, now + 0.11);

  gain.gain.setValueAtTime(Math.min(0.5, 0.35 * intensity + 0.1), now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);

  osc.start(now); osc2.start(now);
  osc.stop(now + 0.2); osc2.stop(now + 0.2);
}

function playLaunch() {
  const ac = audio(), now = ac.currentTime;
  const osc  = ac.createOscillator();
  const filt = ac.createBiquadFilter();
  const gain = ac.createGain();

  filt.type = 'highpass';
  filt.frequency.value = 600;
  osc.connect(filt); filt.connect(gain); gain.connect(ac.destination);

  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(180, now);
  osc.frequency.exponentialRampToValueAtTime(900, now + 0.04);
  osc.frequency.exponentialRampToValueAtTime(90, now + 0.28);

  gain.gain.setValueAtTime(0.22, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.28);
  osc.start(now); osc.stop(now + 0.28);
}

function playSpinOut() {
  const ac = audio(), now = ac.currentTime;
  const osc  = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);

  osc.type = 'triangle';
  osc.frequency.setValueAtTime(380, now);
  osc.frequency.exponentialRampToValueAtTime(40, now + 0.9);
  gain.gain.setValueAtTime(0.14, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.9);
  osc.start(now); osc.stop(now + 0.9);
}

function playWhoosh() {
  const ac = audio(), now = ac.currentTime;
  const sr = ac.sampleRate;
  const len = Math.floor(sr * 0.32);
  const buf = ac.createBuffer(1, len, sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;

  const src  = ac.createBufferSource();
  const filt = ac.createBiquadFilter();
  const gain = ac.createGain();

  src.buffer = buf;
  filt.type = 'bandpass';
  filt.frequency.setValueAtTime(2200, now);
  filt.frequency.exponentialRampToValueAtTime(400, now + 0.32);
  filt.Q.value = 4;

  gain.gain.setValueAtTime(0.28, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);

  src.connect(filt); filt.connect(gain); gain.connect(ac.destination);
  src.start(now);
}

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('game');
let   ctx    = canvas.getContext('2d'); // let so preview draws can swap context

const BLADE_R           = 20;
const FRICTION          = 0.994;
const WALL_DAMP         = 0.72;
const RESTITUTION       = 0.82;
const MAX_SPEED         = 12;
const MAX_POWER         = 14;
const EDGE_START        = 0.82;   // fraction of arenaR where edge drain begins
const EDGE_DRAIN        = 0.18;
const HIT_DRAIN_BASE    = 7;
const AI_INTERVAL       = 0.55;
const BOOST_COOLDOWN = 3.5;
const BOOST_POWER    = 9;

// atkR/defR/staR/spdR/bstR: display ratings 1-10 shown on select screen
// tier: NOVICE | APPRENTICE | ADVANCED | ELITE | CHAMPION | LEGENDARY | MYTHICAL
const CONFIGS = [
  { name:'IMPACT DRAKE',   type:'ATTACK',  color:'#cc2211', glow:'#ff4422', blades:4, shape:'drake',
    maxStamina:100, mass:1.40, defense:0.80, attackMult:1.40, burstResist:0.60, personality:'aggressive',
    desc:'Heavy rubber contact delivers crushing smash attacks. The balanced powerhouse of Beyblade X.',
    atkR:8, defR:5, staR:6, spdR:7, bstR:6, tier:'CHAMPION' },

  { name:'DRAN SWORD',     type:'ATTACK',  color:'#ff6600', glow:'#ff3300', blades:3, shape:'dran',
    maxStamina:75,  mass:0.85, defense:0.75, attackMult:1.72, burstResist:0.28, personality:'aggressive',
    desc:'Three sword blades hit like a typhoon. Highest attack in the game — zero safety margin.',
    atkR:10, defR:3, staR:3, spdR:9, bstR:2, tier:'ELITE' },

  { name:'COBALT DRAGOON', type:'ATTACK',  color:'#1166cc', glow:'#2288ff', blades:4, shape:'dragoon',
    maxStamina:90,  mass:1.30, defense:0.72, attackMult:1.50, burstResist:0.50, personality:'aggressive',
    desc:'Left-spin dragon blade disrupts right-spin opponents. Cobalt blue attack force.',
    atkR:9, defR:4, staR:5, spdR:8, bstR:5, tier:'ELITE' },

  { name:'CRIMSON GARUDA', type:'BALANCE', color:'#cc1100', glow:'#ff2200', blades:4, shape:'garuda',
    maxStamina:115, mass:1.45, defense:0.62, attackMult:1.10, burstResist:0.68, personality:'aggressive',

// ═══════════════════════════════════════════════════════════
// PARTICLE
// ═══════════════════════════════════════════════════════════
class Particle {
  constructor(x, y, color, vx, vy, size, life) {
    Object.assign(this, { x, y, color, vx, vy, size, life, maxLife: life });
  }
  update(dt) {
    this.x  += this.vx * dt;
    this.y  += this.vy * dt;
    this.vx *= 0.95;
    this.vy *= 0.95;
    this.life -= dt;
  }
  draw() {
    const a = Math.max(0, this.life / this.maxLife);
    ctx.save();
    ctx.globalAlpha    = a;
    ctx.fillStyle      = this.color;
    ctx.shadowBlur     = 8;
    ctx.shadowColor    = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * (0.4 + a * 0.6), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════
class Beyblade {
  constructor(cfg, x, y) {
    Object.assign(this, cfg);
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.angle       = Math.random() * Math.PI * 2;
    this.spinRate     = 13 + Math.random() * 7;
    this.stamina      = this.maxStamina;
    this.burstHealth  = 100;           // burst meter, separate from stamina
    this.radius       = BLADE_R;
    this.alive        = true;
    this.bursting     = false;         // mid-burst-death animation
    this.launched     = !this.isPlayer;
    this.wobble       = 0;
    this.wobbleP      = 0;
    this.dying        = 0;
    this.flash        = 0;
    this.aiTimer      = Math.random() * AI_INTERVAL;
    this.trail        = [];            // motion trail positions
  }
}

// ═══════════════════════════════════════════════════════════
// SPAWN
// ═══════════════════════════════════════════════════════════
function startRound() {
  const r = G.arenaR;
  const ax = G.arenaX, ay = G.arenaY;

  G.parts         = [];
  G.blades        = [];
  G.popups        = [];
  G.clashTimer    = 0;
  G.activeTime    = 0;
  G.arenaRCurrent = r;
  G.aiming        = false;
  G.aimX = G.aimY = 0;
  G.shakeX = G.shakeY = G.shakeT = 0;

  // Place all 4 blades evenly around rim (launch positions)
  const startR  = r * 0.74;
  const rimAngles = [
    Math.PI * 0.5,             // bottom  → player
    Math.PI * 1.5,             // top
    Math.PI * (1.5 + 2/3),    // bottom-left
    Math.PI * (1.5 - 2/3),    // bottom-right
  ];

  const playerCfg = { ...CONFIGS[G.selectedChar], isPlayer: true };
  const player    = new Beyblade(playerCfg,
    ax + Math.cos(rimAngles[0]) * startR,
    ay + Math.sin(rimAngles[0]) * startR);
  player.launched = false;
  G.blades.push(player);

  G.selectedOpponents.forEach((cfgIdx, i) => {
    const cfg = { ...CONFIGS[cfgIdx], isPlayer: false };
    const b   = new Beyblade(cfg,
      ax + Math.cos(rimAngles[i + 1]) * startR,
      ay + Math.sin(rimAngles[i + 1]) * startR);
    b.launched = false;   // held until GO
    G.blades.push(b);
  });

  // Apply arena type modifiers to blade stats
  const arenaMods = ARENAS[G.selectedArena].typeModifiers;
  if (arenaMods) {
    G.blades.forEach(b => {
      const mod = arenaMods[b.type];
      if (!mod) return;
      if (mod.attackMult)  b.attackMult  *= mod.attackMult;
      if (mod.maxStamina)  { b.maxStamina *= mod.maxStamina; b.stamina = b.maxStamina; }
      if (mod.defense)     b.defense     *= mod.defense;
      if (mod.burstResist) b.burstResist  = Math.min(0.99, b.burstResist * mod.burstResist);
    });
  }
  G.boostCooldown = 0;

  buildHUD();
  document.getElementById('hud').style.display = 'flex';

  const hint = document.getElementById('launch-hint');
  hint.textContent = 'DRAG YOUR BLADE BACK · RELEASE TO LAUNCH ALL';
  hint.style.display = 'block';
  G.state = 'ready';
}

function launchAll() {
  const ax = G.arenaX, ay = G.arenaY;
  G.blades.forEach(b => {
    if (b.isPlayer) {
      const dx = G.playerLaunchDx, dy = G.playerLaunchDy, d = G.playerLaunchDist;
      const pw = Math.min(d / 10, MAX_POWER);
      b.vx = (dx / d) * pw;
      b.vy = (dy / d) * pw;
      b.spinRate = 18 + pw * 0.8;
    } else {
      const tx  = ax + (Math.random() - 0.5) * 70;
      const ty  = ay + (Math.random() - 0.5) * 70;
      const dx  = tx - b.x, dy = ty - b.y;
      const d   = Math.hypot(dx, dy) || 1;
      const spd = 8 + Math.random() * 4;
      b.vx = (dx / d) * spd;
      b.vy = (dy / d) * spd;
      b.spinRate = 16 + Math.random() * 8;
    }
    b.launched = true;
  });
  // Launch particles for player blade
  const p = G.blades[0];
  if (p) {
    for (let i = 0; i < 18; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 60 + Math.random() * 180;
      G.parts.push(new Particle(p.x, p.y, p.color,
        Math.cos(a)*s, Math.sin(a)*s, 2.5, 0.28 + Math.random()*0.32));
    }
  }
  playLaunch(); playWhoosh();
}

function buildHUD() {
  const hud = document.getElementById('hud');

    const id = b.name.replace(/\s/g, '-');
    hud.insertAdjacentHTML('beforeend', `
      <div class="stamina-bar">
        <div class="stamina-label" style="color:${b.color}">${b.name}</div>
        <div class="stamina-track">

               style="width:100%;background:${b.color};box-shadow:0 0 6px ${b.color}88"></div>
        </div>
      </div>`);
  });
}

function refreshHUD() {
  G.blades.forEach(b => {
    const fill = document.getElementById(`sf-${b.name.replace(/\s/g,'-')}`);
    if (!fill) return;
    const pct = Math.max(0, (b.stamina / b.maxStamina) * 100);
    fill.style.width   = `${pct}%`;
    fill.style.opacity = b.alive ? '1' : '0.2';
    if (pct < 30) fill.style.background = '#ff3333';
  });
}

function spawnHitParticles(x, y, cA, cB, intensity) {
  const n = Math.floor(8 + intensity * 14);
  for (let i = 0; i < n; i++) {
    const a   = Math.random() * Math.PI * 2;
    const spd = 80 + Math.random() * 220 * intensity;
    G.parts.push(new Particle(x, y, Math.random() < .5 ? cA : cB,
      Math.cos(a) * spd, Math.sin(a) * spd, 2 + Math.random() * 2.5, 0.28 + Math.random() * 0.38));
  }
  // white sparks
  for (let i = 0; i < 7; i++) {
    const a   = Math.random() * Math.PI * 2;
    const spd = 160 + Math.random() * 220;
    G.parts.push(new Particle(x, y, '#ffffff',
      Math.cos(a) * spd, Math.sin(a) * spd, 1, 0.1 + Math.random() * 0.18));
  }
}

// ═══════════════════════════════════════════════════════════
// PHYSICS
// ═══════════════════════════════════════════════════════════
function wallCheck(b, arena) {
  const eDrain = arena ? arena.edgeDrain : EDGE_DRAIN;
  const wDamp  = arena ? arena.wallDamp  : WALL_DAMP;
  const dx     = b.x - G.arenaX;
  const dy     = b.y - G.arenaY;
  const dist   = Math.hypot(dx, dy);
  const max    = G.arenaRCurrent - b.radius;

  if (dist > max && dist > 0.01) {
    const nx = dx / dist, ny = dy / dist;
    b.x = G.arenaX + nx * max;
    b.y = G.arenaY + ny * max;
    const dot = b.vx * nx + b.vy * ny;
    b.vx = (b.vx - 2 * dot * nx) * wDamp;
    b.vy = (b.vy - 2 * dot * ny) * wDamp;
    const impact = Math.abs(dot);
    if (impact > 1.8) {
      spawnHitParticles(b.x + nx * b.radius, b.y + ny * b.radius,
        b.color, arena ? arena.rim : '#ffffff', impact / 16);
    }
  }

  const frac = dist / G.arenaRCurrent;
  if (frac > EDGE_START) {
    b.stamina -= eDrain * ((frac - EDGE_START) / (1 - EDGE_START)) * 2.2;
  }
}

function bladeCollide(a, b) {
  const dx   = b.x - a.x;
  const dy   = b.y - a.y;
  const dist = Math.hypot(dx, dy);
  const minD = a.radius + b.radius;
  if (dist >= minD || dist < 0.01) return;

  const nx = dx / dist, ny = dy / dist;

  // Mass-weighted separation
  const totalMass = a.mass + b.mass;
  const ov = (minD - dist);
  a.x -= nx * ov * (b.mass / totalMass);
  a.y -= ny * ov * (b.mass / totalMass);
  b.x += nx * ov * (a.mass / totalMass);
  b.y += ny * ov * (a.mass / totalMass);

  // Mass-weighted impulse
  const rvn = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
  if (rvn < 0) {
    const J = -(1 + RESTITUTION) * rvn / totalMass;
    a.vx -= J * b.mass * nx; a.vy -= J * b.mass * ny;
    b.vx += J * a.mass * nx; b.vy += J * a.mass * ny;
  }

  for (const blade of [a, b]) {
    const sp = Math.hypot(blade.vx, blade.vy);
    if (sp > MAX_SPEED) { blade.vx *= MAX_SPEED / sp; blade.vy *= MAX_SPEED / sp; }
  }

  const spA = Math.hypot(a.vx, a.vy), spB = Math.hypot(b.vx, b.vy);
  const impactForce = Math.abs(rvn) * 2;

  // Stamina damage (attacker's attackMult vs defender's defense)
  const baseDmg = Math.min(HIT_DRAIN_BASE + impactForce * 0.7, 30);
  a.stamina -= baseDmg * b.attackMult * a.defense;
  b.stamina -= baseDmg * a.attackMult * b.defense;

  // Burst meter damage — scales with stamina loss so you can't be one-shot burst at full health
  const wornA = 0.15 + 0.85 * (1 - Math.max(0, Math.min(1, a.stamina / a.maxStamina)));
  const wornB = 0.15 + 0.85 * (1 - Math.max(0, Math.min(1, b.stamina / b.maxStamina)));
  const burstDmgA = impactForce * b.attackMult * (1 - a.burstResist) * wornA * 14;
  const burstDmgB = impactForce * a.attackMult * (1 - b.burstResist) * wornB * 14;
  a.burstHealth -= burstDmgA;
  b.burstHealth -= burstDmgB;

  a.flash = b.flash = 0.18;
  a.idleTime = b.idleTime = 0;   // reset stalemate timer on hit

  const intensity = Math.min(impactForce / 18, 1);
  const cx = (a.x + b.x) / 2, cy = (a.y + b.y) / 2;
  spawnHitParticles(cx, cy, a.color, b.color, intensity);
  G.shakeX = (Math.random() - .5) * 16 * intensity;
  G.shakeY = (Math.random() - .5) * 16 * intensity;
  G.shakeT = 0.18;
  playHit(intensity);

  // ── POWER CLASH: head-on at high speed → slow-mo ──
  if (impactForce > 12 && G.clashTimer <= 0) {
    G.clashTimer = 0.7;
    G.clashX = cx; G.clashY = cy;
    G.clashAlpha = 1;
    spawnHitParticles(cx, cy, '#ffffff', '#ffff00', 1);
    playHit(1);
  }

  // ── BURST FINISH ──
  for (const blade of [a, b]) {
    if (blade.burstHealth <= 0 && !blade.bursting) triggerBurst(blade);
  }
}

function triggerBurst(blade) {
  blade.bursting = true;
  blade.alive    = false;
  blade.stamina  = 0;
  playSpinOut(); playHit(1);

  for (let i = 0; i < 45; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 110 + Math.random() * 260;
    G.parts.push(new Particle(blade.x, blade.y, i % 3 === 0 ? '#ffffff' : blade.color,
      Math.cos(a) * s, Math.sin(a) * s, 3 + Math.random() * 4, 0.7 + Math.random() * 0.8));
  }

  G.popups = G.popups || [];
  G.popups.push({ text: 'BURST FINISH!', x: blade.x, y: blade.y - 30,
    color: blade.color, timer: 1.4, maxTimer: 1.4 });

  G.shakeX = (Math.random() - .5) * 36;
  G.shakeY = (Math.random() - .5) * 36;
  G.shakeT = 0.5;
}

// ═══════════════════════════════════════════════════════════
// AI — personality-driven
// ═══════════════════════════════════════════════════════════
function tickAI(b, dt) {
  if (!b.alive || !b.launched || b.isPlayer) return;

  b.idleTime  = (b.idleTime  || 0) + dt;
  b.aiTimer  -= dt;

  const nearEdge    = Math.hypot(b.x - G.arenaX, b.y - G.arenaY) > G.arenaRCurrent * 0.68;
  const stalemate   = b.idleTime > 7;          // been untouched too long
  const arenaPhase  = G.activeTime / 60;       // 0→1 over 60 seconds (arena shrinks, pressure rises)
  const player      = G.blades.find(x => x.isPlayer && x.alive);
  const otherAlive  = G.blades.filter(x => x !== b && x.alive && x.launched);

  // Nearest target (prefer player, else nearest blade)
  const target = (player && player.launched && Math.random() < 0.6) ? player
    : otherAlive.sort((a, z) => Math.hypot(a.x-b.x,a.y-b.y) - Math.hypot(z.x-b.x,z.y-b.y))[0];

  let tx, ty, accel, speedCap;

  if (nearEdge) {
    // Everyone rushes center when near edge
    tx = G.arenaX + (Math.random()-0.5)*40;
    ty = G.arenaY + (Math.random()-0.5)*40;
    accel    = 2.5;
    speedCap = MAX_SPEED * 0.85;
    b.aiTimer = 0;

  } else if (stalemate && target) {
    // Stalemate breaker: lunge at nearest blade
    tx = target.x; ty = target.y;
    accel    = 3.0 + Math.random();
    speedCap = MAX_SPEED;
    b.aiTimer = AI_INTERVAL * 0.3;
    b.idleTime = 0;

  } else if (b.personality === 'aggressive') {
    if (b.aiTimer > 0) return;
    b.aiTimer = AI_INTERVAL * (0.35 + Math.random() * 0.25);
    accel     = 2.0 + arenaPhase * 1.5 + Math.random();
    speedCap  = MAX_SPEED * (0.85 + arenaPhase * 0.15);
    // Hunt the nearest living target
    if (target) {
      tx = target.x + (Math.random()-0.5)*30;
      ty = target.y + (Math.random()-0.5)*30;
    } else {
      const a = Math.random() * Math.PI * 2;
      tx = G.arenaX + Math.cos(a) * G.arenaRCurrent * 0.25;
      ty = G.arenaY + Math.sin(a) * G.arenaRCurrent * 0.25;
    }

  } else if (b.personality === 'defensive') {
    if (b.aiTimer > 0) return;
    b.aiTimer = AI_INTERVAL * (0.6 + Math.random() * 0.4);
    // Orbit center at medium radius — but tighten orbit as arena shrinks
    const orbitR = Math.min(G.arenaRCurrent * 0.38, 100);
    const angle  = Math.atan2(b.y - G.arenaY, b.x - G.arenaX) + (0.5 + arenaPhase * 0.5);
    tx       = G.arenaX + Math.cos(angle) * orbitR;
    ty       = G.arenaY + Math.sin(angle) * orbitR;
    accel    = 1.2 + arenaPhase * 1.0 + Math.random() * 0.5;
    speedCap = MAX_SPEED * (0.50 + arenaPhase * 0.3);

  } else {
    // 'passive' — still orbits, just tighter and slower, but NOT stationary
    if (b.aiTimer > 0) return;
    b.aiTimer = AI_INTERVAL * (0.7 + Math.random() * 0.5);
    const orbitR = Math.min(G.arenaRCurrent * 0.28, 70);
    const angle  = Math.atan2(b.y - G.arenaY, b.x - G.arenaX) + (0.35 + arenaPhase * 0.6);
    tx       = G.arenaX + Math.cos(angle) * orbitR;
    ty       = G.arenaY + Math.sin(angle) * orbitR;
    accel    = 0.85 + arenaPhase * 1.2 + Math.random() * 0.4;
    speedCap = MAX_SPEED * (0.38 + arenaPhase * 0.4);
  }

  const tdx = tx - b.x, tdy = ty - b.y;
  const tl  = Math.hypot(tdx, tdy);
  if (tl < 1) return;
  b.vx += (tdx / tl) * accel;
  b.vy += (tdy / tl) * accel;
  const sp = Math.hypot(b.vx, b.vy);
  if (sp > speedCap) { b.vx *= speedCap / sp; b.vy *= speedCap / sp; }
}

// ═══════════════════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════════════════
function update(dt) {
  // ── READY: blades rev up but don't move ──
  if (G.state === 'ready') {
    G.blades.forEach(b => {
      if (!b.alive) return;
      b.spinRate = Math.min(b.spinRate + dt * 3, 22); // rev up
      b.angle   += b.spinRate * dt;
    });
    return;
  }

  // ── ACTIVE: track time, apply arena physics, shrink arena ──
  const arena = ARENAS[G.selectedArena];
  G.activeTime += dt;
  if (G.activeTime > 18) {
    const shrinkTarget = G.arenaR * 0.60;
    const shrinkSpeed  = G.arenaR * 0.012 * dt;
    G.arenaRCurrent = Math.max(shrinkTarget, G.arenaRCurrent - shrinkSpeed);
  }

  if (G.boostCooldown > 0) G.boostCooldown = Math.max(0, G.boostCooldown - dt);

  // Power clash slow-mo
  if (G.clashTimer > 0) {
    G.clashTimer -= dt;
    G.clashAlpha = Math.max(0, G.clashTimer / 0.7);
    dt *= 0.18;
  }

  // Shake decay
  if (G.shakeT > 0) {
    G.shakeT -= dt;
    G.shakeX *= 0.80; G.shakeY *= 0.80;
    if (G.shakeT <= 0) { G.shakeX = G.shakeY = 0; }
  }

  G.blades.forEach(b => {
    if (!b.alive || !b.launched) return;
    tickAI(b, dt);

    b.x += b.vx; b.y += b.vy;
    b.vx *= arena.friction; b.vy *= arena.friction;

    b.spinRate = Math.max(0, b.spinRate - dt * (0.25 + b.wobble * 3.5));
    b.angle   += b.spinRate * dt;
    if (b.flash > 0) b.flash -= dt;

    // Motion trail
    const spd = Math.hypot(b.vx, b.vy);
    if (spd > 2.5) b.trail.push({ x: b.x, y: b.y, age: 0 });
    b.trail.forEach(t => t.age += dt);
    b.trail = b.trail.filter(t => t.age < 0.22);

    wallCheck(b, arena);

    if (b.spinRate < 2.5) b.stamina -= dt * 4;

    if (b.stamina <= 0) {
      b.stamina   = 0;
      b.wobble    = Math.min(1, b.wobble + dt * 2.2);
      b.wobbleP  += dt * (14 + b.wobble * 10);
      b.spinRate  = Math.max(0, b.spinRate - dt * 6);
      b.dying    += dt;

      if (b.dying > 1.6) {
        b.alive = false;
        playSpinOut();
        for (let i = 0; i < 22; i++) {
          const a = Math.random() * Math.PI * 2;
          const s = 60 + Math.random() * 120;
          G.parts.push(new Particle(b.x, b.y, b.color,
            Math.cos(a) * s, Math.sin(a) * s, 3, 0.5 + Math.random() * 0.6));
        }
      }
    }
  });

  // Blade-blade collisions
  for (let i = 0; i < G.blades.length; i++) {
    for (let j = i + 1; j < G.blades.length; j++) {
      const a = G.blades[i], b = G.blades[j];
      if (a.alive && b.alive && a.launched && b.launched) bladeCollide(a, b);
    }
  }

  // Particles
  G.parts = G.parts.filter(p => p.life > 0);
  G.parts.forEach(p => p.update(dt));

  refreshHUD();
  checkWin();
}

function checkWin() {
  if (G.state !== 'active') return;
  const alive = G.blades.filter(b => b.alive && b.launched);
  if (alive.length > 1) return;

  G.state = 'over';
  document.getElementById('hud').style.display          = 'none';
  document.getElementById('launch-hint').style.display  = 'none';

  const rT  = document.getElementById('result-title');
  const rS  = document.getElementById('result-sub');
  const w   = alive[0];

  if (!w) {
    rT.textContent = 'DRAW'; rT.className = 'result-title draw';
    rS.textContent = 'ALL BLADES HAVE FALLEN';
  } else if (w.isPlayer) {
    rT.textContent = 'VICTORY!'; rT.className = 'result-title win';
    rS.textContent = `${w.name} IS THE CHAMPION`;
  } else {
    rT.textContent = 'DEFEATED'; rT.className = 'result-title lose';
    rS.textContent = `${w.name} WINS THE ROUND`;
  }

  setTimeout(() => document.getElementById('screen-end').classList.add('active'), 1400);
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function drawBackground() {
  ctx.fillStyle = '#00020a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.fx * canvas.width, s.fy * canvas.height, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,220,255,${s.a})`;
    ctx.fill();
  });
}

function drawArena() {
  const ax = G.arenaX, ay = G.arenaY, ar = G.arenaRCurrent || G.arenaR;
  const a  = ARENAS[G.selectedArena] || ARENAS[0];

  // Outer atmosphere
  const atm = ctx.createRadialGradient(ax, ay, ar * 0.7, ax, ay, ar * 1.3);
  atm.addColorStop(0, a.atm); atm.addColorStop(1, 'transparent');
  ctx.fillStyle = atm;
  ctx.beginPath(); ctx.arc(ax, ay, ar * 1.3, 0, Math.PI * 2); ctx.fill();

  ctx.save();
  ctx.beginPath(); ctx.arc(ax, ay, ar, 0, Math.PI * 2); ctx.clip();

  // Dish gradient
  const dish = ctx.createRadialGradient(ax - ar * 0.18, ay - ar * 0.22, 0, ax, ay, ar);
  dish.addColorStop(0,    a.bg[0]);
  dish.addColorStop(0.45, a.bg[1]);
  dish.addColorStop(0.78, a.bg[2]);
  dish.addColorStop(1,    '#010203');
  ctx.fillStyle = dish;
  ctx.fillRect(ax - ar, ay - ar, ar * 2, ar * 2);

  // Grid rings
  for (let i = 1; i <= 5; i++) {
    ctx.beginPath(); ctx.arc(ax, ay, ar * i / 5, 0, Math.PI * 2);
    ctx.strokeStyle = i === 5 ? a.grid.replace('0.04', '0.08').replace('0.03','0.07') : a.grid;
    ctx.lineWidth   = i === 5 ? 1.2 : 0.5;
    ctx.stroke();
  }
  // Spokes
  for (let i = 0; i < 16; i++) {
    const ang = (i / 16) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax + Math.cos(ang) * ar, ay + Math.sin(ang) * ar);
    ctx.strokeStyle = a.grid; ctx.lineWidth = 0.5; ctx.stroke();
  }
  // Floor highlight
  const chl = ctx.createRadialGradient(ax - ar*0.1, ay - ar*0.18, 0, ax, ay, ar*0.55);
  chl.addColorStop(0, 'rgba(255,255,255,0.032)'); chl.addColorStop(1, 'transparent');
  ctx.fillStyle = chl; ctx.fillRect(ax - ar, ay - ar, ar * 2, ar * 2);
  ctx.restore();

  // Rim
  ctx.save();
  ctx.shadowBlur  = 22; ctx.shadowColor = a.glow;
  ctx.strokeStyle = a.rim + 'aa';
  ctx.lineWidth   = 2.5;
  ctx.beginPath(); ctx.arc(ax, ay, ar, 0, Math.PI * 2); ctx.stroke();
  ctx.shadowBlur  = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(ax, ay, ar, -Math.PI * 0.85, -Math.PI * 0.08); ctx.stroke();
  ctx.restore();
}

function drawArenaToCanvas(arena, pc) {
  const gameCtx = ctx; ctx = pc.getContext('2d');
  const W = pc.width, H = pc.height, ax = W/2, ay = H/2, ar = W * 0.44;
  ctx.fillStyle = '#04060c'; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.beginPath(); ctx.arc(ax,ay,ar,0,Math.PI*2); ctx.clip();
  const dish = ctx.createRadialGradient(ax-ar*0.15,ay-ar*0.2,0,ax,ay,ar);
  dish.addColorStop(0,arena.bg[0]); dish.addColorStop(0.5,arena.bg[1]); dish.addColorStop(1,arena.bg[2]);
  ctx.fillStyle=dish; ctx.fillRect(0,0,W,H);
  for (let i=1;i<=4;i++){ctx.beginPath();ctx.arc(ax,ay,ar*i/4,0,Math.PI*2);ctx.strokeStyle=arena.grid;ctx.lineWidth=0.5;ctx.stroke();}
  ctx.restore();
  ctx.save(); ctx.shadowBlur=14; ctx.shadowColor=arena.glow;
  ctx.strokeStyle=arena.rim+'bb'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(ax,ay,ar,0,Math.PI*2); ctx.stroke(); ctx.restore();
  ctx = gameCtx;
}

function drawBlade(b) {
  if (!b.alive) return;

  const wobX = b.wobble > 0 ? Math.sin(b.wobbleP) * b.wobble * b.radius * 0.32 : 0;
  const wobY = b.wobble > 0 ? Math.cos(b.wobbleP * 0.65) * b.wobble * b.radius * 0.22 : 0;
  const dx   = b.x + wobX, dy = b.y + wobY;
  const R    = b.radius;

  ctx.save();
  ctx.translate(dx, dy);

  // Outer aura
  const flashExtra = b.flash > 0 ? 0.55 : 0;
  const auraR  = R * (2.8 + flashExtra * 1.2);
  const aura   = ctx.createRadialGradient(0, 0, 0, 0, 0, auraR);
  const alphaN = (0.28 + flashExtra).toFixed(2);
  aura.addColorStop(0,   hexAlpha(b.glow, 0.28 + flashExtra));
  aura.addColorStop(0.5, hexAlpha(b.glow, 0.10 + flashExtra * 0.3));
  aura.addColorStop(1,   'transparent');
  ctx.fillStyle = aura;
  ctx.beginPath(); ctx.arc(0, 0, auraR, 0, Math.PI * 2); ctx.fill();

  // ── Motion trail ──
  ctx.save();
  b.trail.forEach(t => {
    const a = 1 - t.age / 0.22;
    ctx.globalAlpha    = a * 0.35;
    ctx.fillStyle      = b.color;
    ctx.shadowBlur     = 6;
    ctx.shadowColor    = b.glow;
    ctx.beginPath();
    ctx.arc(t.x - dx + 0, t.y - dy + 0, R * 0.55 * a, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.restore();

  // Spinning blades
  ctx.rotate(b.angle);
  ctx.shadowBlur  = 12;
  ctx.shadowColor = b.glow;

  for (let i = 0; i < b.blades; i++) {
    ctx.save();
    ctx.rotate((i / b.blades) * Math.PI * 2);
    if      (b.shape === 'drake')   drawDrakeBlade(R);
    else if (b.shape === 'dran')    drawDranBlade(R);
    else if (b.shape === 'dragoon') drawDragoonBlade(R);
    else if (b.shape === 'garuda')  drawGarudaBlade(R);
    else if (b.shape === 'saber')   drawSaberBlade(R);
    else if (b.shape === 'hells')   drawHellsBlade(R);
    else if (b.shape === 'knight')  drawKnightBlade(R);
    else if (b.shape === 'kerbecs') drawKerbecsBlade(R);
    else if (b.shape === 'nemesis') drawNemesisBlade(R);
    else drawBladeShape(b.shape, R, b.color);
    ctx.restore();
  }

  // Hub
  if      (b.shape === 'drake')   { drawDrakeHub(R); }
  else if (b.shape === 'dran')    { drawDranHub(R); }
  else if (b.shape === 'dragoon') { drawDragoonHub(R); }
  else if (b.shape === 'garuda')  { drawGarudaHub(R); }
  else if (b.shape === 'saber')   { drawSaberHub(R); }
  else if (b.shape === 'hells')   { drawHellsHub(R); }
  else if (b.shape === 'knight')  { drawKnightHub(R); }
  else if (b.shape === 'kerbecs') { drawKerbecsHub(R); }
  else if (b.shape === 'nemesis') { drawNemesisHub(R); }
  else {
    const hub = ctx.createRadialGradient(-R * 0.18, -R * 0.18, 0, 0, 0, R * 0.58);
    hub.addColorStop(0,    '#ffffff');
    hub.addColorStop(0.28, b.color);
    hub.addColorStop(1,    '#000000');
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(0, 0, R * 0.58, 0, Math.PI * 2);
    ctx.fillStyle = hub; ctx.fill();

    ctx.shadowBlur  = 14;
    ctx.shadowColor = '#ffffff';
    ctx.fillStyle   = '#ffffff';
    ctx.beginPath(); ctx.arc(0, 0, R * 0.16, 0, Math.PI * 2); ctx.fill();
  }

  ctx.restore();

  // Player indicator triangle
  if (b.isPlayer && b.stamina > 0) {
    ctx.save();
    ctx.font        = `bold 10px 'Orbitron', monospace`;
    ctx.textAlign   = 'center';
    ctx.fillStyle   = b.color;
    ctx.globalAlpha = 0.7;
    ctx.shadowBlur  = 5;
    ctx.shadowColor = b.glow;
    ctx.fillText('YOU', dx, dy + R + 16);
    ctx.restore();
  }
}

function drawDrakeBlade(R) {
  // ── Silver chrome claw body ──
  ctx.beginPath();
  ctx.moveTo(R * 0.12, -R * 0.20);
  ctx.bezierCurveTo(R * 0.30, -R * 0.66, R * 0.82, -R * 0.90, R * 1.22, -R * 0.62);
  ctx.bezierCurveTo(R * 1.50, -R * 0.38, R * 1.54, R * 0.04,  R * 1.34, R * 0.22);
  ctx.bezierCurveTo(R * 1.10, R * 0.40,  R * 0.68, R * 0.40,  R * 0.36, R * 0.26);
  ctx.bezierCurveTo(R * 0.18, R * 0.16,  R * 0.06, R * 0.06,  R * 0.12, -R * 0.20);

  const sg = ctx.createLinearGradient(-R * 0.1, -R * 0.4, R * 1.4, R * 0.25);
  sg.addColorStop(0,    '#70708a');
  sg.addColorStop(0.25, '#b8b8cc');
  sg.addColorStop(0.5,  '#e2e2ee');
  sg.addColorStop(0.75, '#c8c8da');
  sg.addColorStop(1,    '#707082');
  ctx.fillStyle   = sg;
  ctx.shadowBlur  = 6;
  ctx.shadowColor = '#9090b0';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth   = 0.7;
  ctx.stroke();

  // ── Inner cutout shadow (skeletal look) ──
  ctx.beginPath();
  ctx.moveTo(R * 0.40, -R * 0.30);
  ctx.bezierCurveTo(R * 0.52, -R * 0.58, R * 0.86, -R * 0.64, R * 1.05, -R * 0.45);
  ctx.bezierCurveTo(R * 1.18, -R * 0.30, R * 1.12, -R * 0.10, R * 0.92, R * 0.00);
  ctx.bezierCurveTo(R * 0.72, R * 0.10,  R * 0.44, R * 0.08,  R * 0.32, -R * 0.05);
  ctx.bezierCurveTo(R * 0.22, -R * 0.15, R * 0.30, -R * 0.20, R * 0.40, -R * 0.30);
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.shadowBlur = 0;
  ctx.fill();

  // ── Red rubber bumper (leading contact edge) ──
  ctx.beginPath();
  ctx.moveTo(R * 0.60, -R * 0.80);
  ctx.bezierCurveTo(R * 0.82, -R * 0.98, R * 1.14, -R * 0.84, R * 1.26, -R * 0.58);
  ctx.bezierCurveTo(R * 1.18, -R * 0.38, R * 0.90, -R * 0.40, R * 0.72, -R * 0.56);
  ctx.closePath();
  const rg = ctx.createLinearGradient(R * 0.65, -R * 0.85, R * 1.2, -R * 0.45);
  rg.addColorStop(0,   '#ff4433');
  rg.addColorStop(0.5, '#cc1a08');
  rg.addColorStop(1,   '#991100');
  ctx.fillStyle   = rg;
  ctx.shadowBlur  = 14;
  ctx.shadowColor = '#ff3322';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,120,90,0.45)';
  ctx.lineWidth   = 0.7;
  ctx.stroke();

  // ── Blue accent chip at outer tip ──
  ctx.beginPath();
  ctx.ellipse(R * 1.40, R * 0.10, R * 0.11, R * 0.07, -0.4, 0, Math.PI * 2);
  ctx.fillStyle   = '#3355cc';
  ctx.shadowBlur  = 8;
  ctx.shadowColor = '#5577ff';
  ctx.fill();
}

function drawDrakeHub(R) {
  // Dark navy disc
  const hg = ctx.createRadialGradient(-R * 0.14, -R * 0.14, 0, 0, 0, R * 0.60);
  hg.addColorStop(0,   '#28366a');
  hg.addColorStop(0.5, '#111828');
  hg.addColorStop(1,   '#050a18');
  ctx.beginPath(); ctx.arc(0, 0, R * 0.60, 0, Math.PI * 2);
  ctx.fillStyle   = hg;
  ctx.shadowBlur  = 10;
  ctx.shadowColor = '#0a1840';
  ctx.fill();

  // Teal dragon head (simplified serpent profile)
  ctx.save();
  ctx.shadowBlur  = 5;
  ctx.shadowColor = '#00ccee';
  ctx.fillStyle   = '#00aabb';
  ctx.beginPath();

function drawBladeShape(shape, R, color) {
  ctx.beginPath();
  if (shape === 'wing') {
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(R * 0.35, -R * 0.32, R * 1.05, -R * 0.16, R * 1.22, R * 0.08);
    ctx.bezierCurveTo(R * 0.98,  R * 0.38, R * 0.28,  R * 0.22, 0, 0);
  } else if (shape === 'horn') {
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(R * 0.28, -R * 0.42, R * 0.88, -R * 0.52, R * 1.32, 0);
    ctx.bezierCurveTo(R * 0.88,  R * 0.12, R * 0.22,  R * 0.16, 0, 0);
  } else if (shape === 'claw') {
    ctx.moveTo(0, 0);
    ctx.lineTo(R * 0.55, -R * 0.52);
    ctx.lineTo(R * 1.12, -R * 0.18);
    ctx.lineTo(R * 0.88,  R * 0.22);
    ctx.lineTo(R * 0.28,  R * 0.10);
    ctx.closePath();
  } else { // fang
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(R * 0.48, -R * 0.6, R * 1.38, -R * 0.28, R * 1.22, R * 0.22);
    ctx.bezierCurveTo(R * 0.92,  R * 0.42, R * 0.2,   R * 0.2,  0, 0);
  }

  const gr = ctx.createLinearGradient(0, 0, R * 1.2, 0);
  gr.addColorStop(0,   color + 'dd');
  gr.addColorStop(0.5, color + 'ff');
  gr.addColorStop(1,   color + '33');
  ctx.fillStyle   = gr;
  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.lineWidth   = 0.8;
  ctx.fill();
  ctx.stroke();
}

function hexAlpha(hex, alpha) {
  // Convert hex color + alpha to rgba
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha.toFixed(2)})`;
}

function drawAimGuide() {
  if (!G.aiming) return;
  const player = G.blades[0];
  if (!player || player.launched) return;

  const dx   = player.x - G.aimX;
  const dy   = player.y - G.aimY;
  const dist = Math.hypot(dx, dy);
  const pFrac = Math.min(dist, MAX_POWER * 10) / (MAX_POWER * 10);

  // Slingshot band
  ctx.save();
  ctx.strokeStyle = 'rgba(0,212,255,0.5)';
  ctx.lineWidth   = 2;
  ctx.setLineDash([5, 7]);
  ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(G.aimX, G.aimY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Launch arrow
  const launchA  = Math.atan2(dy, dx);
  const arrowLen = 44 + pFrac * 72;
  const ex = player.x + Math.cos(launchA) * arrowLen;
  const ey = player.y + Math.sin(launchA) * arrowLen;

  const col = pFrac < 0.45 ? '#00ff88' : pFrac < 0.8 ? '#ffcc00' : '#ff4444';
  ctx.save();
  ctx.strokeStyle = col;
  ctx.lineWidth   = 2.8;
  ctx.shadowBlur  = 12;
  ctx.shadowColor = col;
  ctx.lineCap = 'round';

  ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(ex, ey); ctx.stroke();

  const hl = 13;
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - hl * Math.cos(launchA - 0.42), ey - hl * Math.sin(launchA - 0.42));
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - hl * Math.cos(launchA + 0.42), ey - hl * Math.sin(launchA + 0.42));
  ctx.stroke();

  // Power label
  ctx.font      = `bold 11px 'Orbitron', monospace`;
  ctx.textAlign = 'center';
  ctx.fillStyle = col;
  ctx.shadowBlur = 6;
  ctx.fillText(`PWR ${Math.round(pFrac * 100)}%`, G.aimX, G.aimY - 18);
  ctx.restore();
}

function drawLaunchPad(player) {
  if (!player || G.state !== 'ready') return;
  ctx.save();
  ctx.strokeStyle = hexAlpha(player.color, 0.5);
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([4, 7]);
  ctx.shadowBlur  = 10;
  ctx.shadowColor = player.color;
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.radius + 12, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawCountdown() {
  if (G.state !== 'countdown') return;
  const t   = G.countdown;
  const num = Math.ceil(t);
  // Pulse scale: 1 → 0.7 over each second
  const phase = t % 1;
  const scale = 0.72 + phase * 0.28;
  const sz    = Math.floor(110 * scale);

  ctx.save();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  if (t > 0.05) {
    ctx.font        = `900 ${sz}px 'Orbitron', monospace`;
    ctx.fillStyle   = num === 1 ? '#ff4422' : num === 2 ? '#ffcc00' : '#ffffff';
    ctx.shadowBlur  = 50;
    ctx.shadowColor = ctx.fillStyle;
    ctx.globalAlpha = 0.9;
    ctx.fillText(String(num), canvas.width / 2, canvas.height / 2);
  } else {
    // GO!
    const goAlpha = Math.min(1, (0.5 - t) * 6);
    ctx.font        = `900 ${Math.floor(120 + goAlpha * 20)}px 'Orbitron', monospace`;
    ctx.fillStyle   = '#00ff88';
    ctx.shadowBlur  = 60;
    ctx.shadowColor = '#00ff88';
    ctx.globalAlpha = Math.max(0, 1 - goAlpha * 2);
    ctx.fillText('GO!', canvas.width / 2, canvas.height / 2);
  }

  // Hint below
  ctx.font        = `bold 11px 'Share Tech Mono', monospace`;
  ctx.fillStyle   = '#556';
  ctx.shadowBlur  = 0;
  ctx.globalAlpha = 0.8;
  ctx.fillText('DRAG TO AIM YOUR BLADE', canvas.width / 2, canvas.height / 2 + 80);
  ctx.restore();
}

// Shrinking arena warning ring
function drawShrinkWarning() {
  if (G.activeTime < 15 || G.arenaRCurrent <= G.arenaR * 0.61) return;
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.006);
  const ratio = 1 - (G.arenaRCurrent - G.arenaR * 0.60) / (G.arenaR * 0.40);
  ctx.save();
  ctx.strokeStyle = `rgba(255,80,0,${0.4 + pulse * 0.5})`;
  ctx.lineWidth   = 3 + ratio * 4;
  ctx.shadowBlur  = 20 + ratio * 20;
  ctx.shadowColor = '#ff4400';
  ctx.beginPath();
  ctx.arc(G.arenaX, G.arenaY, G.arenaRCurrent, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawBoostIndicator() {
  if (G.state !== 'active') return;
  const player = G.blades.find(b => b.isPlayer && b.alive);
  if (!player) return;
  const R     = player.radius + 9;
  const ready = G.boostCooldown <= 0;
  const pct   = ready ? 1 : 1 - (G.boostCooldown / BOOST_COOLDOWN);
  ctx.save();
  // Dim track ring
  ctx.beginPath();
  ctx.arc(player.x, player.y, R, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Charging arc
  if (pct > 0) {
    ctx.beginPath();
    ctx.arc(player.x, player.y, R, -Math.PI / 2, -Math.PI / 2 + pct * Math.PI * 2);
    ctx.strokeStyle = ready ? player.color : '#4488aa';
    ctx.lineWidth   = 2.5;
    ctx.shadowBlur  = ready ? 10 : 0;
    ctx.shadowColor = player.color;
    ctx.stroke();
  }
  // "BOOST" label when ready
  if (ready) {
    ctx.font        = `bold 7px 'Share Tech Mono', monospace`;
    ctx.textAlign   = 'center';
    ctx.fillStyle   = player.color;
    ctx.shadowBlur  = 6;
    ctx.shadowColor = player.color;
    ctx.globalAlpha = 0.85;
    ctx.fillText('BOOST', player.x, player.y + R + 10);
  }
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();

  ctx.save();
  ctx.translate(G.shakeX, G.shakeY);

  drawArena();
  drawShrinkWarning();
  G.parts.forEach(p => p.draw());
  G.blades.forEach(b => drawBlade(b));
  drawLaunchPad(G.blades[0]);
  drawAimGuide();
  drawBoostIndicator();
  drawCountdown();

  // ── POWER CLASH overlay ──
  if (G.clashTimer > 0 && G.clashAlpha > 0) {
    const a = G.clashAlpha;
    // Flash ring at impact point
    ctx.save();
    ctx.globalAlpha = a * 0.7;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth   = 3;
    ctx.shadowBlur  = 30;
    ctx.shadowColor = '#ffff88';
    ctx.beginPath();
    ctx.arc(G.clashX, G.clashY, 28 + (1 - a) * 40, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // POWER CLASH text
    ctx.save();
    ctx.globalAlpha = Math.min(1, a * 2);
    ctx.font        = `900 ${Math.floor(22 + a * 10)}px 'Orbitron', monospace`;
    ctx.textAlign   = 'center';
    ctx.fillStyle   = '#ffff44';
    ctx.shadowBlur  = 25;
    ctx.shadowColor = '#ffaa00';
    ctx.fillText('POWER CLASH!', G.clashX, G.clashY - 44 - (1 - a) * 20);
    ctx.restore();
  }

  ctx.restore();

  // ── BURST events rendered in screen space ──
  G.popups = (G.popups || []).filter(p => p.timer > 0);
  G.popups.forEach(p => {
    p.timer -= 0.016;
    const a = Math.min(1, p.timer * 3);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.font        = `900 ${Math.floor(18 + (1 - a) * 8)}px 'Orbitron', monospace`;
    ctx.textAlign   = 'center';
    ctx.fillStyle   = p.color;
    ctx.shadowBlur  = 20;
    ctx.shadowColor = p.color;
    ctx.fillText(p.text, p.x, p.y - (1 - p.timer / p.maxTimer) * 50);
    ctx.restore();
  });
}

// ═══════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════
function loop(ts) {
  const dt = Math.min((ts - G.lastTime) / 1000, 0.05);
  G.lastTime = ts;
  if (G.state === 'ready' || G.state === 'active') update(dt);
  render();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════
function pos(e) {
  const rc = canvas.getBoundingClientRect();
  const t  = e.touches ? e.touches[0] : e;
  return { x: t.clientX - rc.left, y: t.clientY - rc.top };
}

function onDown(e) {
  if (G.state === 'ready') {
    const player = G.blades[0];
    if (!player) return;
    const p = pos(e);
    if (Math.hypot(p.x - player.x, p.y - player.y) < player.radius * 4) {
      G.aiming = true;
      G.aimX   = p.x; G.aimY = p.y;
    }
  } else if (G.state === 'active') {
    const player = G.blades.find(b => b.isPlayer && b.alive);
    if (!player || G.boostCooldown > 0) return;
    const p  = pos(e);
    const dx = p.x - player.x, dy = p.y - player.y;
    const d  = Math.hypot(dx, dy) || 1;
    player.vx += (dx / d) * BOOST_POWER;
    player.vy += (dy / d) * BOOST_POWER;
    const sp = Math.hypot(player.vx, player.vy);
    if (sp > MAX_SPEED) { player.vx *= MAX_SPEED / sp; player.vy *= MAX_SPEED / sp; }
    G.boostCooldown = BOOST_COOLDOWN;
    for (let i = 0; i < 12; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 70 + Math.random() * 110;
      G.parts.push(new Particle(player.x, player.y, player.color,
        Math.cos(a)*s, Math.sin(a)*s, 1.8, 0.18 + Math.random()*0.22));
    }
  }
}
function onMove(e) {
  if (!G.aiming) return;
  const p = pos(e);
  G.aimX = p.x; G.aimY = p.y;
}
function onUp(e) {
  if (!G.aiming) return;
  G.aiming = false;
  const player = G.blades[0];
  if (!player) return;

  const dx   = player.x - G.aimX;
  const dy   = player.y - G.aimY;
  const dist = Math.hypot(dx, dy);
  if (dist < 12) return;

  // Store aim for launchAll to use
  G.playerLaunchDx = dx; G.playerLaunchDy = dy; G.playerLaunchDist = dist;
  launchAll();
  G.state = 'active';
  document.getElementById('launch-hint').style.display = 'none';
}

canvas.addEventListener('mousedown',  onDown);
canvas.addEventListener('mousemove',  onMove);
canvas.addEventListener('mouseup',    onUp);
canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); onUp(e);   }, { passive: false });

// ═══════════════════════════════════════════════════════════
// SCREEN BUTTONS
// ═══════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  if (id) document.getElementById(id).classList.add('active');
}

// ── BLADE PREVIEW RENDERER ──
function drawBladeToCanvas(cfg, previewCanvas) {
  const gameCtx = ctx;
  ctx = previewCanvas.getContext('2d');
  const W = previewCanvas.width, H = previewCanvas.height;
  const R = W * 0.30;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#07090f';
  ctx.fillRect(0, 0, W, H);

  // Subtle glow bg
  const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W/2);
  bg.addColorStop(0, hexAlpha(cfg.glow, 0.18));
  bg.addColorStop(1, 'transparent');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.rotate(Math.PI / 8);

  for (let i = 0; i < cfg.blades; i++) {
    ctx.save();
    ctx.rotate((i / cfg.blades) * Math.PI * 2);
    ctx.shadowBlur  = 10;
    ctx.shadowColor = cfg.glow;
    if      (cfg.shape === 'drake')   drawDrakeBlade(R);
    else if (cfg.shape === 'dran')    drawDranBlade(R);
    else if (cfg.shape === 'dragoon') drawDragoonBlade(R);
    else if (cfg.shape === 'garuda')  drawGarudaBlade(R);
    else if (cfg.shape === 'saber')   drawSaberBlade(R);
    else if (cfg.shape === 'hells')   drawHellsBlade(R);
    else if (cfg.shape === 'knight')  drawKnightBlade(R);
    else drawBladeShape(cfg.shape, R, cfg.color);
    ctx.restore();
  }

  if      (cfg.shape === 'drake')   drawDrakeHub(R);
  else if (cfg.shape === 'dran')    drawDranHub(R);
  else if (cfg.shape === 'dragoon') drawDragoonHub(R);
  else if (cfg.shape === 'garuda')  drawGarudaHub(R);
  else if (cfg.shape === 'saber')   drawSaberHub(R);
  else if (cfg.shape === 'hells')   drawHellsHub(R);
  else if (cfg.shape === 'knight')  drawKnightHub(R);
  else {
    const hub = ctx.createRadialGradient(-R*0.18, -R*0.18, 0, 0, 0, R*0.58);
    hub.addColorStop(0,    '#ffffff');
    hub.addColorStop(0.28, cfg.color);
    hub.addColorStop(1,    '#000000');
    ctx.shadowBlur  = 8;
    ctx.shadowColor = cfg.glow;
    ctx.beginPath(); ctx.arc(0, 0, R * 0.58, 0, Math.PI * 2);
    ctx.fillStyle = hub; ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#ffffff';
    ctx.beginPath(); ctx.arc(0, 0, R * 0.15, 0, Math.PI * 2); ctx.fill();
  }

  ctx.restore();
  ctx = gameCtx;
}

// ── CHARACTER SELECT SCREEN ──
const TYPE_COLORS = { ATTACK:'#ff4422', DEFENSE:'#4488ff', STAMINA:'#00ff88', BALANCE:'#ffcc00' };
const TIER_COLORS = {
  NOVICE:     '#778899',
  APPRENTICE: '#33cc66',
  ADVANCED:   '#3399ff',
  ELITE:      '#9944ff',
  CHAMPION:   '#ffbb00',
  LEGENDARY:  '#ff3311',
  MYTHICAL:   '#ff88ff',
};
const STAT_KEYS   = ['atkR','defR','staR','spdR','bstR'];
const STAT_LABELS = ['ATK','DEF','STA','SPD','BST'];

function buildSelectScreen() {
  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';
  const previewCanvases = [];

  CONFIGS.forEach((cfg, i) => {
    const tc   = TYPE_COLORS[cfg.type] || '#fff';
    const card = document.createElement('div');
    card.className = 'char-card' + (i === G.selectedChar ? ' selected' : '');
    card.style.setProperty('--c', cfg.color);
    if (i === G.selectedChar) {
      card.style.borderColor = cfg.color;
      card.style.boxShadow   = `0 0 14px ${cfg.color}55`;
    }

    const statBars = STAT_KEYS.map((k, si) => `
      <div class="stat-row">
        <div class="stat-label">${STAT_LABELS[si]}</div>
        <div class="stat-track">
          <div class="stat-fill" style="width:${cfg[k]*10}%;background:${cfg.color};box-shadow:0 0 4px ${cfg.color}88"></div>
        </div>
      </div>`).join('');

    const tierColor = TIER_COLORS[cfg.tier] || '#aaa';
    const tierClass = cfg.tier === 'MYTHICAL' ? ' tier-mythical' : '';
    card.innerHTML = `
      <canvas class="blade-preview" width="72" height="72" style="display:block;margin:0 auto 4px;border-radius:50%;border:1px solid ${cfg.color}33"></canvas>
      <div class="char-card-name" style="color:${cfg.color}">${cfg.name}</div>
      <div style="display:flex;gap:4px;justify-content:center;margin-bottom:7px;flex-wrap:wrap">
        <div class="char-type-badge" style="background:${tc}22;color:${tc};margin-bottom:0">${cfg.type}</div>
        <div class="char-tier-badge${tierClass}" style="background:${tierColor}22;color:${tierColor}">${cfg.tier}</div>
      </div>
      ${statBars}`;

    card.addEventListener('click', () => selectChar(i));
    grid.appendChild(card);
    previewCanvases.push({ canvas: card.querySelector('.blade-preview'), cfg });
  });

  // Render blade previews after DOM is ready
  requestAnimationFrame(() => {
    previewCanvases.forEach(({ canvas: pc, cfg }) => drawBladeToCanvas(cfg, pc));
  });

  selectChar(G.selectedChar, false);
}

function selectChar(i, rebuild = true) {
  G.selectedChar = i;
  if (rebuild) buildSelectScreen();

  const cfg = CONFIGS[i];
  const tc  = TYPE_COLORS[cfg.type] || '#fff';

  const tierColor = TIER_COLORS[cfg.tier] || '#aaa';
  document.getElementById('detail-name').textContent  = cfg.name;
  document.getElementById('detail-name').style.color  = cfg.color;
  document.getElementById('detail-type').textContent  = cfg.type;
  document.getElementById('detail-type').style.color  = tc;
  const tierEl = document.getElementById('detail-tier');
  tierEl.textContent = cfg.tier;
  tierEl.style.color = tierColor;
  tierEl.className   = cfg.tier === 'MYTHICAL' ? 'tier-mythical' : '';
  document.getElementById('detail-desc').textContent  = cfg.desc;

  document.getElementById('detail-stats').innerHTML = STAT_KEYS.map((k, si) => `
    <div class="big-stat">
      <div class="big-stat-val" style="color:${cfg.color};text-shadow:0 0 12px ${cfg.color}">${cfg[k]}</div>
      <div class="big-stat-lbl">${STAT_LABELS[si]}</div>
    </div>`).join('');
}

document.getElementById('btn-start').addEventListener('click', () => {
  audio();
  buildSelectScreen();
  showScreen('screen-select');
});

// ── ARENA SELECT ──
function buildArenaScreen() {
  const grid = document.getElementById('arena-grid');
  grid.innerHTML = '';

  ARENAS.forEach((ar, i) => {
    const card = document.createElement('div');
    card.className = 'arena-card' + (i === G.selectedArena ? ' selected' : '');
    if (i === G.selectedArena) {
      card.style.borderColor = ar.rim;
      card.style.boxShadow   = `0 0 14px ${ar.glow}55`;
    }
    const pc = document.createElement('canvas');
    pc.width = 120; pc.height = 80;
    card.appendChild(pc);
    card.insertAdjacentHTML('beforeend', `
      <div class="arena-card-body">
        <div class="arena-card-name" style="color:${ar.rim}">${ar.name}</div>
        <div class="arena-card-sub">${ar.sub}</div>
      </div>`);
    card.addEventListener('click', () => selectArena(i));
    grid.appendChild(card);

    requestAnimationFrame(() => drawArenaToCanvas(ar, pc));
  });

  selectArena(G.selectedArena, false);
}

function selectArena(i, rebuild = true) {
  G.selectedArena = i;
  if (rebuild) buildArenaScreen();
  const ar = ARENAS[i];
  document.getElementById('arena-detail-name').textContent = ar.name;
  document.getElementById('arena-detail-name').style.color = ar.rim;
  document.getElementById('arena-detail-desc').textContent = ar.desc;
  const aff = document.getElementById('arena-affinity-row');
  if (aff) {
    const parts = [];
    if (ar.favors)    parts.push(`<span class="affinity-pos">▲ FAVORS ${ar.favors}</span>`);
    if (ar.penalizes) parts.push(`<span class="affinity-neg">▼ PENALIZES ${ar.penalizes}</span>`);
    aff.innerHTML = parts.join('<span style="color:#223"> · </span>');
  }
}

// ── OPPONENT SELECT ──
function buildOpponentsScreen() {
  // Remove player from opponents if they changed their own blade to one that's in opponents
  G.selectedOpponents = G.selectedOpponents.filter(i => i !== G.selectedChar);

  const grid = document.getElementById('opp-grid');
  grid.innerHTML = '';
  const previewCanvases = [];

  CONFIGS.forEach((cfg, i) => {
    if (i === G.selectedChar) return; // can't pick yourself

    const tc   = TYPE_COLORS[cfg.type] || '#fff';
    const sel  = G.selectedOpponents.includes(i);
    const card = document.createElement('div');
    card.className = 'char-card opp-card' + (sel ? ' selected-opp' : '');
    card.style.setProperty('--c', sel ? cfg.color : '#333');
    if (sel) {
      card.style.borderColor = cfg.color;
      card.style.boxShadow   = `0 0 14px ${cfg.color}55`;
    } else {
      card.style.borderColor = '#1a1f2e';
    }

    const statBars = STAT_KEYS.map((k, si) => `
      <div class="stat-row">
        <div class="stat-label">${STAT_LABELS[si]}</div>
        <div class="stat-track">
          <div class="stat-fill" style="width:${cfg[k]*10}%;background:${cfg.color};box-shadow:0 0 4px ${cfg.color}88"></div>
        </div>
      </div>`).join('');

    card.innerHTML = `
      <canvas class="blade-preview" width="72" height="72" style="display:block;margin:0 auto 4px;border-radius:50%;border:1px solid ${cfg.color}33"></canvas>
      <div class="char-card-name" style="color:${sel ? cfg.color : '#445'}">${cfg.name}</div>
      <div class="char-type-badge" style="background:${tc}22;color:${tc}">${cfg.type}</div>
      ${statBars}`;

    // Arena affinity indicator dot
    const arMods = ARENAS[G.selectedArena].typeModifiers;
    const mod = arMods && arMods[cfg.type];
    if (mod && Object.keys(mod).length > 0) {
      let score = 0;
      if (mod.attackMult)  score += mod.attackMult  > 1 ? 1 : -1;
      if (mod.maxStamina)  score += mod.maxStamina  > 1 ? 1 : -1;
      if (mod.defense)     score += mod.defense     < 1 ? 1 : -1; // lower defense = better
      if (mod.burstResist) score += mod.burstResist > 1 ? 1 : -1;
      if (score !== 0) {
        const dot = document.createElement('div');
        dot.className = 'card-affinity';
        dot.title = score > 0 ? 'BUFFED in this arena' : 'PENALIZED in this arena';
        const c = score > 0 ? '#00ff88' : '#ff4422';
        dot.style.background = c;
        dot.style.boxShadow  = `0 0 6px ${c}`;
        card.appendChild(dot);
      }
    }

    card.addEventListener('click', () => {
      if (G.selectedOpponents.includes(i)) {
        G.selectedOpponents = G.selectedOpponents.filter(x => x !== i);
      } else if (G.selectedOpponents.length < 3) {
        G.selectedOpponents.push(i);
      }
      buildOpponentsScreen();
    });

    grid.appendChild(card);
    previewCanvases.push({ canvas: card.querySelector('.blade-preview'), cfg });
  });

  requestAnimationFrame(() => {
    previewCanvases.forEach(({ canvas: pc, cfg }) => drawBladeToCanvas(cfg, pc));
  });

  const count = G.selectedOpponents.length;
  const label = document.getElementById('opp-count-label');
  label.textContent = count === 3 ? '3 / 3 SELECTED — READY!' : `${count} / 3 SELECTED`;
  label.style.color = count === 3 ? '#00ff88' : '#445';

  const btn = document.getElementById('btn-opponents');
  btn.disabled = count !== 3;
  btn.style.opacity = count === 3 ? '1' : '0.35';
  btn.style.pointerEvents = count === 3 ? '' : 'none';
}

// ── randomize opponents ──
function randomizeOpponents() {
  const pool = CONFIGS.map((_, i) => i).filter(i => i !== G.selectedChar);
  G.selectedOpponents = [];
  while (G.selectedOpponents.length < 3 && pool.length > 0) {
    const idx = Math.floor(Math.random() * pool.length);
    G.selectedOpponents.push(pool.splice(idx, 1)[0]);
  }
  buildOpponentsScreen();
}

document.getElementById('btn-fight').addEventListener('click', () => {
  buildArenaScreen();
  showScreen('screen-arena');
});

document.getElementById('btn-arena-back').addEventListener('click', () => {
  buildSelectScreen();
  showScreen('screen-select');
});

document.getElementById('btn-arena-next').addEventListener('click', () => {
  buildOpponentsScreen();
  showScreen('screen-opponents');
});

document.getElementById('btn-opp-back').addEventListener('click', () => {
  buildArenaScreen();
  showScreen('screen-arena');
});

document.getElementById('btn-randomize').addEventListener('click', randomizeOpponents);

document.getElementById('btn-opponents').addEventListener('click', () => {
  if (G.selectedOpponents.length !== 3) return;
  showScreen(null);
  startRound();
});

document.getElementById('btn-restart').addEventListener('click', () => {
  buildSelectScreen();
  showScreen('screen-select');
});

window.addEventListener('resize', resize);
resize();
G.lastTime = performance.now();
requestAnimationFrame(loop);
</script>
