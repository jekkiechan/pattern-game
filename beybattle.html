<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEYBATTLE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/beybattle.css">
</head>
<body>

<canvas id="game"></canvas>
<div id="hud"></div>
<div id="launch-hint" style="display:none">CLICK YOUR BLADE · DRAG BACK · RELEASE TO LAUNCH</div>

<div id="overlay">
  <div class="screen active" id="screen-start">
    <h1>BeyBattle</h1>
    <div class="subtitle">Spinning Top Arena Combat</div>
    <div class="mode-row">
      <button class="btn" id="btn-start">QUICK BATTLE</button>
      <button class="btn btn-tournament" id="btn-tournament">TOURNAMENT</button>
    </div>
    <div id="trophy-display"></div>
    <div class="subtitle" style="font-size:10px;color:#333;margin-top:-8px">
      3 rounds · stamina carries over · be crowned champion
    </div>
  </div>

  <div class="screen" id="screen-select">
    <h2>SELECT YOUR BLADE</h2>
    <div id="char-grid"></div>
    <div id="char-detail">
      <div>
        <div id="detail-name"></div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:2px">
          <div id="detail-type"></div>
          <div id="detail-tier" style="font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px"></div>
        </div>
        <div id="detail-desc"></div>
        <div id="detail-special"></div>
      </div>
      <div id="detail-stats"></div>
    </div>
    <div class="nav-row">
      <button class="btn-back" id="btn-select-back">← BACK</button>
      <button class="btn" id="btn-fight">CHOOSE ARENA →</button>
    </div>
  </div>

  <div class="screen" id="screen-opponents">
    <h2>PICK YOUR OPPONENTS</h2>
    <div class="subtitle" id="opp-count-label">SELECT 3 OPPONENTS</div>
    <div id="opp-grid"></div>
    <div class="nav-row">
      <button class="btn-back" id="btn-opp-back">← BACK</button>
      <button class="btn-secondary" id="btn-randomize">RANDOMIZE</button>
      <button class="btn" id="btn-opponents">LET IT RIP →</button>
    </div>
  </div>

  <div class="screen" id="screen-arena">
    <h2>CHOOSE YOUR ARENA</h2>
    <div id="arena-grid"></div>
    <div id="arena-detail">
      <div>
        <div id="arena-detail-name"></div>
        <div id="arena-detail-desc"></div>
        <div id="arena-affinity-row" class="affinity-row"></div>
      </div>
    </div>
    <div class="nav-row">
      <button class="btn-back" id="btn-arena-back">← BACK</button>
      <button class="btn" id="btn-arena-next">PICK OPPONENTS →</button>
    </div>
  </div>

  <div class="screen" id="screen-end">
    <div class="result-title" id="result-title"></div>
    <div class="subtitle" id="result-sub" style="color:#445"></div>
    <button class="btn" id="btn-restart">BATTLE AGAIN</button>
  </div>

  <div class="screen" id="screen-bracket">
    <h2 class="bracket-title">TOURNAMENT</h2>
    <div id="bracket-rounds"></div>
    <div id="bracket-status" class="subtitle"></div>
    <button class="btn" id="btn-next-round">BEGIN ROUND 1 →</button>
  </div>

  <div class="screen" id="screen-champion">
    <div class="champion-crown">♔</div>
    <div class="result-title win">CHAMPION!</div>
    <div class="subtitle" id="champion-sub"></div>
    <div id="champion-stats">
      <div class="champ-stat">
        <div class="champ-stat-val" id="champion-trophies">0</div>
        <div class="champ-stat-lbl">TROPHIES</div>
      </div>
      <div class="champ-stat">
        <div class="champ-stat-val" id="champion-streak">—</div>
        <div class="champ-stat-lbl">RECORD</div>
      </div>
    </div>
    <button class="btn" id="btn-champion-home">BACK TO TITLE</button>
  </div>
</div>

<script src="js/beybattle/audio.js"></script>
<script src="js/beybattle/config.js"></script>
<script src="js/beybattle/entities.js"></script>
<script src="js/beybattle/state.js"></script>
<script src="js/beybattle/spawn.js"></script>
<script src="js/beybattle/physics.js"></script>
<script src="js/beybattle/specials.js"></script>
<script src="js/beybattle/ai.js"></script>
<script src="js/beybattle/update.js"></script>
<script src="js/beybattle/render.js"></script>
<script src="js/beybattle/tournament.js"></script>
<script src="js/beybattle/game.js"></script>
</body>
</html>
