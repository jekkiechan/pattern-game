<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEYBLADE GAMES</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: 'Orbitron', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 48px;
  }
  h1 {
    font-size: clamp(1.5rem, 5vw, 3rem);
    font-weight: 900;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #00e5ff;
    text-shadow: 0 0 20px #00e5ff88;
  }
  .games {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }
  a.card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 36px 48px;
    border: 2px solid #00e5ff44;
    border-radius: 12px;
    text-decoration: none;
    color: #fff;
    background: #0a0a1a;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
  }
  a.card:hover {
    border-color: #00e5ff;
    box-shadow: 0 0 32px #00e5ff44;
    transform: translateY(-4px);
  }
  .card-title {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #00e5ff;
  }
  .card-desc {
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    color: #aaa;
    text-transform: uppercase;
  }
  .icon { font-size: 3rem; }
  .how-to-play {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #334;
    text-decoration: none;
    padding: 8px 18px;
    border: 1px solid #111;
    border-radius: 4px;
    transition: color 0.2s, border-color 0.2s;
  }
  .how-to-play:hover { color: #00e5ff; border-color: #00e5ff44; }
</style>
</head>
<body>
  <h1>Beyblade Games</h1>
  <a class="how-to-play" href="how-to-play.html">? HOW TO PLAY</a>
  <div class="games">
    <a class="card" href="beyblade-climber.html">
      <div class="icon">🌀</div>
      <div class="card-title">Beyblade Climber</div>
      <div class="card-desc">Climb to the top</div>
    </a>
    <a class="card" href="beybattle.html">
      <div class="icon">⚔️</div>
      <div class="card-title">Beybattle</div>
      <div class="card-desc">Battle it out</div>
    </a>
  </div>
</body>
</html>
